<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程管理系統 | StudyAbroad 後台</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --sidebar-width: 260px;
            --primary-dark: #0a2647;
            --accent-orange: #ff9800;
            --bg-light: #f0f4f8;
            --logout-pink: #ff8a8a;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Noto Sans TC', 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
        }

        /* --- 1. 側邊欄 Sidebar (可愛簡潔版) --- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--primary-dark);
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
        }

        .logo-box {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-orange), #ffb74d);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            margin: 0 auto 10px;
            box-shadow: 0 4px 10px rgba(255, 152, 0, 0.3);
        }

        .sidebar-nav {
            flex-grow: 1;
            padding: 10px 0;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            padding: 12px 25px;
            margin: 4px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            transition: 0.3s;
            text-decoration: none;
        }

        .nav-link i {
            width: 30px;
            font-size: 1.1rem;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--accent-orange) !important;
        }

        /* --- 2. 左下角可愛登出按鈕 --- */
        .sidebar-footer {
            padding: 20px 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-logout-cute {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--logout-pink);
            background: rgba(255, 138, 138, 0.1);
            padding: 12px 15px;
            border-radius: 15px;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logout-icon {
            width: 32px;
            height: 32px;
            background: var(--logout-pink);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            transition: 0.3s;
        }

        .btn-logout-cute:hover {
            background: var(--logout-pink);
            color: white;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255, 138, 138, 0.3);
        }

        .btn-logout-cute:hover .logout-icon {
            background: white;
            color: var(--logout-pink);
            transform: rotate(-10deg);
        }

        /* --- 3. 主內容區 Main Content --- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 40px;
            min-height: 100vh;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .card-stat {
            border: none;
            border-radius: 20px;
            padding: 20px;
            background: white;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .card-table-container {
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: none;
        }

        .table thead th {
            background-color: #f8f9fa;
            border-top: none;
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            padding: 15px;
        }

        .table tbody td {
            padding: 15px;
            font-size: 0.8rem;
        }

        .table tbody td code {
            font-size: .9em
        }

        .btn-add {
            background: linear-gradient(135deg, var(--primary-dark), #1a4d8a);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(10, 38, 71, 0.2);
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* --- RWD --- */
        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h6 class="text-white fw-bold mb-0">StudyAbroad</h6>
            <small class="text-white-50" style="letter-spacing: 1px;">MANAGEMENT</small>
        </div>

        <div class="sidebar-nav">
            <nav>
                <a href="/admin/courses" class="nav-link active"><i class="fa-solid fa-book-open"></i> 課程管理</a>
                <a href="/admin/orders" class="nav-link"><i class="fa-solid fa-receipt"></i> 訂單管理</a>
                <a href="/admin/visitors" class="nav-link"><i class="fa-solid fa-envelope-open-text"></i> 訪客紀錄</a>
                <a href="/admin/students" class="nav-link"><i class="fa-solid fa-user-graduate"></i> 學生資料</a>
                <a href="/admin/staff" class="nav-link"><i class="fa-solid fa-user-gear"></i> 員工管理</a>
            </nav>
        </div>

        <div class="sidebar-footer">
            <a href="/login" class="btn-logout-cute">
                <div class="logout-icon">
                    <i class="fa-solid fa-person-walking-arrow-right"></i>
                </div>
                <span>登出系統</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div>
                <h3 class="fw-bold text-dark">學生基本資料</h3>
                <p class="text-muted small">管理已註冊學員的個人檔案與緊急聯絡人</p>
            </div>
<!--            <button class="btn btn-add" data-bs-toggle="modal" data-bs-target="#addStudentModal">-->
<!--                <i class="fa-solid fa-user-plus me-2"></i> 修改學生資料-->
<!--            </button>-->
        </div>

        <div class="card card-table-container">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>性別/姓名/生日</th>
                            <th>學生 ID</th>
                            <th>國籍</th>
                            <th>電子郵件</th>
                            <th>手機號碼</th>
                            <th>註冊時間</th>
                            <th class="text-end">詳細資訊</th>
                        </tr>
                    </thead>
                    <tbody>
                    <tr th:each="student : ${students}">
                        <td>
                            <div class="d-flex align-items-center">
                                <div class="rounded-circle bg-info-subtle text-info p-2 me-3 text-center"
                                     style="width: 40px; height: 40px;"
                                     th:text="${student.gender != null ? student.gender.label : '未設定'}">
                                </div>
                                <div>
                                    <div class="fw-bold" th:text="${student.nameZh}">姓名</div>
                                    <small class="text-muted"
                                           th:text="${student.birthday}">生日</small>
                                </div>
                            </div>
                        </td>

                        <td>
                            <code th:text="${student.uuid}">UUID</code>
                        </td>

<!--                        <td th:text="${student.country.name}">台灣</td>-->
                        <td th:text="${student.country != null ? student.country.name : '未設定'}"></td>

                        <td th:text="${student.email}"></td>

                        <td th:text="${student.phone}"></td>

                        <td>
<!--                            <small th:text="${student.createdAt}"></small>-->
<!--                            <small th:text="${#temporals.format(student.createdAt, 'yyyy/MM/dd HH:mm')}"></small>-->
                            <th:block th:if="${student.createdAt != null}">
                                <small th:text="${#temporals.format(student.createdAt, 'yyyy/MM/dd HH:mm')}"></small>
                            </th:block>
                        </td>

                        <td class="text-end">
<!--                            <button class="btn btn-sm btn-theme rounded-pill px-3">-->
<!--                                查看檔案-->
<!--                            </button>-->
<!--                            <button class="btn btn-sm btn-theme rounded-pill px-3" data-bs-toggle="modal"-->
<!--                                    data-bs-target="#studentDetailModal">-->
<!--                                查看檔案-->
<!--                            </button>-->
                            <button class="btn btn-primary"
                                    th:onclick="'showStudentDetail(' + ${student.id} + ')'">
                                查看檔案
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal fade" id="studentDetailModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 25px;">
                <div class="modal-header border-0 p-4 pb-0">
                    <h5 class="fw-bold text-primary"><i class="fa-solid fa-id-card me-2"></i>學員進階檔案</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

<!--                <div class="modal-body p-4">-->
<!--                    <div class="row g-4">-->

<!--                        <div class="col-md-6">-->
<!--                            <b>出生日期：</b>-->
<!--                            <span id="birthDate"></span>-->
<!--                        </div>-->

<!--                        <div class="col-md-6">-->
<!--                            <b>國籍：</b>-->
<!--                            <span id="country"></span>-->
<!--                        </div>-->

<!--                        <div class="col-md-6">-->
<!--                            <b>預約 ID：</b>-->
<!--                            <span id="bookingId"></span>-->
<!--                        </div>-->

<!--                        <div class="col-md-6">-->
<!--                            <b>註冊時間：</b>-->
<!--                            <span id="createdAt"></span>-->
<!--                        </div>-->

<!--                        <div class="col-md-6">-->
<!--                            <b>緊急聯絡人：</b>-->
<!--                            <span id="iceContact"></span>-->
<!--                        </div>-->

<!--                        <div class="col-md-6">-->
<!--                            <b>聯絡電話：</b>-->
<!--                            <span id="icePhone"></span>-->
<!--                        </div>-->

<!--                    </div>-->
<!--                </div>-->
                    <div class="modal-body p-4">
                        <div class="row g-4">

                            <!-- 基本背景 -->
                            <div class="col-md-6 p-3 bg-light rounded-4 border-white border">
                                <h6 class="fw-bold mb-3">基本背景</h6>
                                <ul class="list-unstyled small mb-0">

                                    <li class="mb-2">
                                        <b>出生日期：</b>
                                        <span id="birthDate"></span>
                                    </li>

                                    <li class="mb-2">
                                        <b>國籍：</b>
                                        <span id="country"></span>
                                    </li>

                                    <li class="mb-2">
                                        <b>預約 ID：</b>
                                        <span id="appointmentId"></span>
                                    </li>

                                    <li>
                                        <b>註冊時間：</b>
                                        <span id="createdAt"></span>
                                    </li>

                                </ul>
                            </div>

                            <!-- 緊急聯絡 -->
                            <div class="col-md-6 p-3 bg-danger-subtle rounded-4 border-white border">
                                <h6 class="fw-bold mb-3 text-danger">緊急聯絡資訊</h6>
                                <ul class="list-unstyled small mb-0">

                                    <li class="mb-2">
                                        <b>緊急聯絡人：</b>
                                        <span id="iceContact"></span>
                                    </li>

                                    <li class="mb-2">
                                        <b>聯絡電話：</b>
                                        <span id="icePhone"></span>
                                    </li>

                                </ul>
                            </div>

                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">關閉</button>
<!--                    <button class="btn btn-primary rounded-pill px-4">編輯學生資料</button>-->
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addCourseModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 25px;">
                <div class="modal-header border-0 p-4 pb-0">
                    <h5 class="fw-bold"><i class="fa-solid fa-plus-circle me-2 text-primary"></i>建立新課程</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">國家名稱</label>
                            <input type="text" class="form-control rounded-3" placeholder="例如：日本">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">課程 ID</label>
                            <input type="text" class="form-control rounded-3" placeholder="JP-KY-01">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">狀態</label>
                            <select class="form-select rounded-3">
                                <option>上架</option>
                                <option>下架</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">課程完整名稱</label>
                            <input type="text" class="form-control rounded-3">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">費用 (TWD)</label>
                            <input type="number" class="form-control rounded-3">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">可報名人數</label>
                            <input type="number" class="form-control rounded-3">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">已報名人數</label>
                            <input type="number" class="form-control rounded-3" value="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">課程開始時間</label>
                            <input type="date" class="form-control rounded-3">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">課程結束時間</label>
                            <input type="date" class="form-control rounded-3">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">備註</label>
                            <textarea class="form-control rounded-3" rows="3" placeholder="特殊要求或注意事項..."></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4">確認儲存並上架</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="addStudentModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 25px;">
                <div class="modal-header border-0 p-4 pb-0">
                    <h5 class="fw-bold"><i class="fa-solid fa-user-plus me-2 text-primary"></i>註冊新學生檔案</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form class="row g-3">
                        <div class="col-12"><small class="text-muted fw-bold">基本資訊</small>
                            <hr class="mt-1 mb-2">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label small fw-bold">姓名</label>
                            <input type="text" class="form-control rounded-3" placeholder="例如：黃詩雲">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">性別</label>
                            <select class="form-select rounded-3">
                                <option selected disabled>請選擇</option>
                                <option>男</option>
                                <option>女</option>
                                <option>其他</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">出生日期</label>
                            <input type="date" class="form-control rounded-3">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label small fw-bold">學生 ID</label>
                            <input type="text" class="form-control rounded-3" placeholder="STD-2026-XXX">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">電子郵件 (Email)</label>
                            <input type="email" class="form-control rounded-3" placeholder="example@mail.com">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label small fw-bold">國籍</label>
                            <input type="text" class="form-control rounded-3" placeholder="例如：台灣">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">手機號碼</label>
                            <input type="tel" class="form-control rounded-3" placeholder="09XX-XXX-XXX">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">預約 ID</label>
                            <input type="text" class="form-control rounded-3" placeholder="BK-XXXXX">
                        </div>

                        <div class="col-12 mt-4"><small class="text-danger fw-bold">緊急聯絡人資訊</small>
                            <hr class="mt-1 mb-2">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label small fw-bold">聯絡人姓名</label>
                            <input type="text" class="form-control rounded-3 border-danger-subtle">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">聯絡人電話</label>
                            <input type="tel" class="form-control rounded-3 border-danger-subtle">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">關係</label>
                            <input type="text" class="form-control rounded-3 border-danger-subtle"
                                placeholder="例如：母女、配偶">
                        </div>

                        <div class="col-md-6 mt-4">
                            <label class="form-label small fw-bold">註冊日期</label>
                            <input type="datetime-local" class="form-control rounded-3">
                        </div>
                        <div class="col-12 mt-3">
                            <label class="form-label small fw-bold">備註說明</label>
                            <textarea class="form-control rounded-3" rows="2" placeholder="是否有特殊過敏史或學習需求..."></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4">確認新增學生</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function showStudentDetail(id) {
            fetch(`/admin/students/${id}`)
                .then(res => res.json())
                .then(data => {

                    document.getElementById("birthDate").innerText =
                        data.birthday ? new Date(data.birthday).toLocaleDateString() : '';

                    document.getElementById("country").innerText =
                        data.country?.name ?? '未設定';

                    document.getElementById("appointmentId").innerText =
                        data.appointmentId ?? '';

                    document.getElementById("createdAt").innerText =
                        data.createdAt ? new Date(data.createdAt).toLocaleString() : '';

                    document.getElementById("iceContact").innerText =
                        data.iceContact ?? '';

                    document.getElementById("icePhone").innerText =
                        data.icePhone ?? '';

                    new bootstrap.Modal(document.getElementById('studentDetailModal')).show();
                });
        }
    </script>
    </script>


</body>
</html>
