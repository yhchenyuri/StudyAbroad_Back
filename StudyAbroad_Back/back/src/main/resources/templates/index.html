<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程管理系統 | StudyAbroad 後台</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --sidebar-width: 260px;
            --primary-dark: #0a2647;
            --accent-orange: #ff9800;
            --bg-light: #f0f4f8;
            --logout-pink: #ff8a8a;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Noto Sans TC', 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
        }

        /* --- 1. 側邊欄 Sidebar (可愛簡潔版) --- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--primary-dark);
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
        }

        .logo-box {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-orange), #ffb74d);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            margin: 0 auto 10px;
            box-shadow: 0 4px 10px rgba(255, 152, 0, 0.3);
        }

        .sidebar-nav {
            flex-grow: 1;
            padding: 10px 0;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            padding: 12px 25px;
            margin: 4px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            transition: 0.3s;
            text-decoration: none;
        }

        .nav-link i {
            width: 30px;
            font-size: 1.1rem;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--accent-orange) !important;
        }

        /* --- 2. 左下角可愛登出按鈕 --- */
        .sidebar-footer {
            padding: 20px 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-logout-cute {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--logout-pink);
            background: rgba(255, 138, 138, 0.1);
            padding: 12px 15px;
            border-radius: 15px;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logout-icon {
            width: 32px;
            height: 32px;
            background: var(--logout-pink);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            transition: 0.3s;
        }

        .btn-logout-cute:hover {
            background: var(--logout-pink);
            color: white;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255, 138, 138, 0.3);
        }

        .btn-logout-cute:hover .logout-icon {
            background: white;
            color: var(--logout-pink);
            transform: rotate(-10deg);
        }

        /* --- 3. 主內容區 Main Content --- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 40px;
            min-height: 100vh;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .card-stat {
            border: none;
            border-radius: 20px;
            padding: 20px;
            background: white;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .card-table-container {
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: none;
        }

        .table thead th {
            background-color: #f8f9fa;
            border-top: none;
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            padding: 15px;
        }

        .table tbody td {
            padding: 15px;
            font-size: 0.95rem;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--primary-dark), #1a4d8a);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(10, 38, 71, 0.2);
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* --- RWD --- */
        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h6 class="text-white fw-bold mb-0">StudyAbroad</h6>
            <small class="text-white-50" style="letter-spacing: 1px;">MANAGEMENT</small>
        </div>

        <div class="sidebar-nav">
            <nav>
                <a href="/admin/courses" class="nav-link active"><i class="fa-solid fa-book-open"></i> 課程管理</a>
                <a href="/admin/orders" class="nav-link"><i class="fa-solid fa-receipt"></i> 訂單管理</a>
                <a href="/admin/visitors" class="nav-link"><i class="fa-solid fa-envelope-open-text"></i> 訪客紀錄</a>
                <a href="/admin/students" class="nav-link"><i class="fa-solid fa-user-graduate"></i> 學生資料</a>
                <a href="/admin/staff" class="nav-link"><i class="fa-solid fa-user-gear"></i> 員工管理</a>
            </nav>
        </div>

        <div class="sidebar-footer">
            <a href="/login" class="btn-logout-cute">
                <div class="logout-icon">
                    <i class="fa-solid fa-person-walking-arrow-right"></i>
                </div>
                <span>登出系統</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div>
                <h3 class="fw-bold text-dark">課程專案管理</h3>
                <p class="text-muted small">在此管理各國留學課程與報名狀態</p>
            </div>
            <button class="btn btn-add" data-bs-toggle="modal" data-bs-target="#addCourseModal">
                <i class="fa-solid fa-plus me-2"></i> 新增課程
            </button>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card-stat">
                    <small class="text-muted">上架中課程</small>
                    <h2 class="fw-bold mb-0 text-primary">12</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-stat">
                    <small class="text-muted">本月報名總數</small>
                    <h2 class="fw-bold mb-0 text-success">48</h2>
                </div>
            </div>
        </div>

        <div class="card card-table-container">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>國家名稱</th>
                            <th>課程 ID</th>
                            <th>課程名稱</th>
                            <th>費用</th>
                            <th>報名人數 (已報/可報)</th>
                            <th>日期範圍</th>
                            <th>狀態</th>
                            <th class="text-end">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><span class="badge bg-light text-dark border me-1">UK</span> 英國</td>
                            <td><code>LSE-SUM-26</code></td>
                            <td class="fw-bold">倫敦大學政經夏令營</td>
                            <td class="text-primary fw-bold">NT$ 120,000</td>
                            <td>
                                <div class="progress mb-1" style="height: 6px; width: 100px;">
                                    <div class="progress-bar bg-primary" style="width: 75%"></div>
                                </div>
                                <small class="text-muted">15 / 20</small>
                            </td>
                            <td><small>2026/07/15 - 08/20</small></td>
                            <td><span class="status-badge bg-success-subtle text-success">上架中</span></td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-light rounded-circle me-1"><i
                                        class="fa-solid fa-pen-to-square"></i></button>
                                <button class="btn btn-sm btn-light text-danger rounded-circle"><i
                                        class="fa-solid fa-trash-can"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal fade" id="addCourseModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 25px;">
                <div class="modal-header border-0 p-4 pb-0">
                    <h5 class="fw-bold"><i class="fa-solid fa-plus-circle me-2 text-primary"></i>建立新課程</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">國家名稱</label>
                            <input type="text" class="form-control rounded-3" placeholder="例如：日本">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">課程 ID</label>
                            <input type="text" class="form-control rounded-3" placeholder="JP-KY-01">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">狀態</label>
                            <select class="form-select rounded-3">
                                <option>上架</option>
                                <option>下架</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">課程完整名稱</label>
                            <input type="text" class="form-control rounded-3">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">費用 (TWD)</label>
                            <input type="number" class="form-control rounded-3">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">可報名人數</label>
                            <input type="number" class="form-control rounded-3">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">已報名人數</label>
                            <input type="number" class="form-control rounded-3" value="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">課程開始時間</label>
                            <input type="date" class="form-control rounded-3">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">課程結束時間</label>
                            <input type="date" class="form-control rounded-3">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">備註</label>
                            <textarea class="form-control rounded-3" rows="3" placeholder="特殊要求或注意事項..."></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4">確認儲存並上架</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
